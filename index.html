<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
        integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <div class="navbar">
            <!-- <i class="ri-menu-2-line ham"></i> -->
            <i class="ri-settings-3-line ham"></i>
            <h1> <i class="ri-wallet-3-fill"></i> FinTrack Pro</h1>
            <div class="add">
                <button class="addbtn"><i class="ri-add-line plus"></i> Add Transaction</button>
                <i class="ri-settings-3-line setting"></i>
            </div>
        </div>
    </nav>
    <main class="container">
        <div class="dashboard">
            <h1>Dashboard</h1>
            <p>Track your income,expenses and grow your wealth. </p>
        </div>
        <div class="summary">
            <div class="card-container">
                <div class="cards balance">
                    <div class="info">
                        <i class="ri-wallet-2-fill wallet"></i>
                        <h3>Balance</h3>
                    </div>
                    <div>
                        <h4 class="balance-amount">₹0</h4>
                    </div>
                </div>
                <div class="cards income">
                    <div class="info">
                        <i class="ri-currency-fill money"></i>
                        <h3>Income</h3>
                    </div>
                    <div>
                        <h4 class="income-amount">₹0</h4>
                    </div>
                </div>
                <div class="cards expenses">
                    <div class="info">
                        <i class="ri-arrow-down-line arrow"></i>
                        <h3>Expense</h3>
                    </div>
                    <div>
                        <h4 class="expense-amount">₹0</h4>
                    </div>
                </div>
                <div class="cards transactions">
                    <div class="info">
                        <i class="ri-file-list-3-line notes"></i>
                        <h3>Transactions</h3>
                    </div>
                    <div>
                        <h4 class="transaction-amount">0</h4>
                    </div>
                </div>
            </div>
        </div>
        <div class="cashflow">
            <div class="cashflow-header">
                <div class="top">
                    <h1>Cashflow Overview</h1>
                    <select name="" id="">
                        <option value="this">This Month</option>
                        <option value="last">Last Month</option>
                        <option value="year">This Year</option>
                    </select>
                </div>

                <div class="chart">
                    <canvas id="cashFlow-chart"></canvas>
                </div>

            </div>
        </div>
        <section class="transactions-section">

            <div class="transactions-header">

                <div class="title">
                    <h2>Recent Transactions</h2>
                    <p>Manage all your income and expenses.</p>
                </div>

                <!-- <button class="view-all">
                    View All
                </button> -->

            </div>

            <div class="toolbar">

                <div class="filters">

                    <button class="active allbtn">All</button>
                    <button class="incomebtn">Income</button>
                    <button class="expensebtn">Expense</button>

                </div>

                <div class="search">

                    <input type="text" placeholder="Search...">

                </div>

            </div>

            <div class="transaction-list">

                <!-- <div class="transaction-card">

                    <div class="transaction-top">

                        <div class="transaction-details">
                            <div class="bottom-section">
                                <h3>Salary</h3>
                                <h2 class="income-text">+ ₹35,000</h2>
                            </div>
                            <p>Salary</p>
                        </div>
                    </div>

                    <div class="transaction-bottom">
                        <span>28 Jun 2026</span>

                        <div class="delete">
                            <button class="delete-btn">
                                <i class="ri-delete-bin-line"></i>
                            </button>
                        </div>

                    </div>

                </div>
                <div class="transaction-card">

                    <div class="transaction-top">

                        <div class="transaction-details">
                            <div class="bottom-section">
                                <h3>Salary</h3>
                                <h2 class="income-text">+ ₹35,000</h2>
                            </div>
                            <p>Salary</p>
                        </div>
                    </div>

                    <div class="transaction-bottom">
                        <span>28 Jun 2026</span>

                        <div class="delete">
                            <button class="delete-btn">
                                <i class="ri-delete-bin-line"></i>
                            </button>
                        </div>

                    </div>

                </div> -->
            </div>
        </section>

    </main>

    <section class="modal">
        <div class="transaction-modal">
            <div class="modal-top">
                <h1>Add Transaction</h1>
                <i class="ri-close-large-fill cross"></i>
            </div>
            <div class="modal-bottom">
                <div class="type">
                    <h2>Type</h2>
                    <div class="type-btns">
                        <button class="income-type ">Income</button>
                        <button class="expense-type ">Expense</button>
                    </div>
                </div>
                <div class="desc">
                    <h2>Description</h2>
                    <input type="text" id="desc">
                </div>
                <div class="amount-field">
                    <h2>Amount</h2>
                    <input type="number" id="amount">
                </div>
                <div class="categories">
                    <h2>Catergory</h2>
                    <select name="" id="category">
                        <option value="food">Food</option>
                        <option value="shopping">Shopping</option>
                        <option value="business">Business</option>
                        <option value="investment">Investment</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="date">
                    <h2>Date</h2>
                    <input type="date" id="date">
                </div>
                <div class="bottom-btns">
                    <button class="cancel">Cancel</button>
                    <button class="save">Save</button>
                </div>
            </div>
        </div>
    </section>

    <section class="settings-modal">

        <div class="settings-box">

            <div class="settings-header">
                <h2>⚙️ Settings</h2>
                <i class="ri-close-large-line settings-close"></i>
            </div>

            <div class="settings-body">

                <div class="setting-group">
                    <label>Profile Name</label>
                    <input type="text" placeholder="Enter your name">
                </div>

                <div class="setting-group">
                    <label>Preferred Currency</label>

                    <select>

                        <option>INR ₹</option>
                        <option>USD $</option>
                        <option>EUR €</option>
                        <option>GBP £</option>
                        <option>JPY ¥</option>

                    </select>

                </div>

                <div class="setting-group toggle-row">

                    <span>Dark Mode</span>

                    <label class="switch">

                        <input type="checkbox">

                        <span class="slider"></span>

                    </label>

                </div>

                <div class="setting-group">

                    <button class="reset-btn">

                        <i class="ri-delete-bin-line"></i>

                        Reset All Data

                    </button>

                </div>

                <div class="settings-buttons">

                    <button class="cancel-settings">
                        Cancel
                    </button>

                    <button class="save-settings">
                        Save Changes
                    </button>

                </div>

            </div>

        </div>

    </section>

    <script src="script.js"></script>
</body>

</html>
